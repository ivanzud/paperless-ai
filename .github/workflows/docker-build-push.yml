name: Build and Push Docker Images

on:
  push:
    branches:
      - main
  release:
    types: [published]  # Only triggers when a release is published
  schedule:
    - cron: "0 0 * * *" # Nightly build
jobs:
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - variant: cpu
            tag_suffix: ""
            torch_extra: ""
          - variant: gpu
            tag_suffix: "-gpu"
            torch_extra: "gpu"
    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set image destinations
        id: image_destinations
        run: |
          if [[ "${GITHUB_REPOSITORY}" == "clusterzx/paperless-ai" ]]; then
            echo "publish_dockerhub=true" >> "$GITHUB_OUTPUT"
            {
              echo "images<<EOF"
              echo "${{ secrets.DOCKER_USERNAME }}/paperless-ai"
              echo "ghcr.io/${GITHUB_REPOSITORY_OWNER}/paperless-ai"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          else
            echo "publish_dockerhub=false" >> "$GITHUB_OUTPUT"
            {
              echo "images<<EOF"
              echo "ghcr.io/${GITHUB_REPOSITORY_OWNER}/paperless-ai"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          fi

      - name: Log in to Docker Hub
        if: steps.image_destinations.outputs.publish_dockerhub == 'true'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
          
      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
          
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.image_destinations.outputs.images }}
          tags: |
            type=schedule,pattern=nightly,suffix=${{ matrix.tag_suffix }}
            type=semver,pattern={{version}},suffix=${{ matrix.tag_suffix }},enable=${{ github.event_name == 'release' }}
            type=raw,value=latest${{ matrix.tag_suffix }},enable=${{ github.event_name == 'release' || github.ref == 'refs/heads/main' }}
            type=sha,format=short,suffix=${{ matrix.tag_suffix }},enable=${{ github.event_name != 'schedule' }}
            
      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            TORCH_EXTRA=${{ matrix.torch_extra }}
